# CI — typecheck, lint, unit tests on every push/PR. First guardrail added
# 2026-07-11 (teardown flag: zero tests, zero CI). The unit tests cover the
# pure pipeline logic (clustering, quote scoping, merge validation, window
# math) — no network, no DB, no GPT — so this stays fast and secret-free.
name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
